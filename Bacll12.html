<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bacll 2026 · Countdown · Khat MengHeng</title>
  <!-- Google Fonts for elegance + Khmer -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Khmer:wght@300;400;600;700;900&family=Inter:opsz,wght@14..32,200;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    /* ----- RESET & GLOBAL (blue palette) ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eef4fa;
      background-image: 
        radial-gradient(ellipse at 20% 30%, #dce8f5 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, #c5d8ec 0%, transparent 50%),
        linear-gradient(135deg, #eef4fa 0%, #dce6f2 100%);
      font-family: 'Noto Serif Khmer', 'Inter', serif;
      padding: 1.6rem;
      margin: 0;
      min-height: 100vh;
    }

    /* ----- MAIN CARD (clean, premium, blue tones) ----- */
    .exam-card {
      max-width: 880px;
      width: 100%;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 4.5rem 4.5rem 3.8rem 3.8rem;
      padding: 3.2rem 2.4rem 2.6rem;
      box-shadow: 
        0 30px 70px rgba(30, 60, 100, 0.15),
        0 0 0 1px rgba(70, 120, 180, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(70, 130, 200, 0.15);
      transition: box-shadow 0.4s ease, transform 0.25s ease;
      text-align: center;
      position: relative;
    }

    .exam-card:hover {
      box-shadow: 
        0 40px 90px rgba(30, 60, 120, 0.2),
        0 0 0 2px #7aa9d9,
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      transform: translateY(-3px);
    }

    /* subtle blue shimmer */
    .exam-card::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -20%;
      width: 70%;
      height: 70%;
      background: radial-gradient(circle, rgba(100, 180, 255, 0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .exam-card > * {
      position: relative;
      z-index: 1;
    }

    /* ----- TYPOGRAPHY & HEADER (blue contrast) ----- */
    .main-title {
      font-size: 3.6rem;
      font-weight: 700;
      color: #1a3b5c;
      text-shadow: 0 2px 12px rgba(0, 40, 80, 0.06);
      letter-spacing: 3px;
      margin-bottom: 0.1rem;
      line-height: 1.2;
      font-family: 'Noto Serif Khmer', serif;
    }

    .badge-sub {
      font-size: 1.2rem;
      font-weight: 400;
      color: #3a6a8a;
      background: rgba(60, 130, 200, 0.08);
      display: inline-block;
      padding: 0.2rem 2.4rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(60, 130, 200, 0.15);
      letter-spacing: 3px;
      margin-bottom: 1.8rem;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
    }

    .exam-name-block {
      font-size: 3rem;
      font-weight: 700;
      color: #1a3b5c;
      background: rgba(60, 130, 200, 0.06);
      padding: 0.5rem 2.6rem;
      border-radius: 100px;
      display: inline-block;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(60, 130, 200, 0.15);
      box-shadow: 0 4px 16px rgba(0, 40, 80, 0.03);
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      font-family: 'Noto Serif Khmer', serif;
    }

    .exam-date-block {
      font-size: 1.7rem;
      font-weight: 400;
      color: #2a5a7a;
      background: rgba(60, 130, 200, 0.06);
      padding: 0.3rem 2.2rem;
      border-radius: 80px;
      display: inline-block;
      border: 1px solid rgba(60, 130, 200, 0.12);
      backdrop-filter: blur(4px);
      margin-bottom: 2.8rem;
      letter-spacing: 2px;
      font-family: 'Inter', sans-serif;
    }

    /* ----- COUNTDOWN GRID (blue accents) ----- */
    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.4rem;
      margin: 2rem 0 1.8rem;
    }

    .time-unit {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 2.6rem;
      padding: 1.2rem 0.2rem 0.8rem;
      box-shadow: 
        inset 0 -6px 0 rgba(60, 130, 200, 0.12),
        0 12px 32px rgba(30, 60, 120, 0.06);
      border: 1px solid rgba(60, 130, 200, 0.12);
      transition: all 0.25s ease;
      position: relative;
    }

    .time-unit::after {
      content: '';
      position: absolute;
      top: 0;
      left: 15%;
      width: 70%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(60, 130, 200, 0.15), transparent);
      opacity: 0.5;
    }

    .time-unit:hover {
      border-color: #6a9ec9;
      transform: scale(1.02);
      box-shadow: inset 0 -6px 0 rgba(60, 130, 200, 0.2), 0 16px 40px rgba(30, 60, 120, 0.08);
    }

    .time-number {
      font-size: 5.2rem;
      font-weight: 700;
      color: #0a2a4a;
      text-shadow: 0 2px 8px rgba(0, 40, 80, 0.04);
      line-height: 1.1;
      letter-spacing: 4px;
      font-feature-settings: "tnum";
      font-family: 'Inter', sans-serif;
    }

    .time-label {
      font-size: 1.1rem;
      font-weight: 400;
      color: #3a6a8a;
      background: rgba(60, 130, 200, 0.06);
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      display: inline-block;
      margin: 0.2rem auto 0;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
      border: 1px solid rgba(60, 130, 200, 0.08);
      backdrop-filter: blur(2px);
      min-width: 60px;
    }

    /* ----- STATUS PANEL (blue soft) ----- */
    .status-panel {
      margin-top: 2.2rem;
      font-size: 2rem;
      font-weight: 400;
      color: #1a4a6a;
      background: rgba(255, 255, 255, 0.5);
      padding: 1rem 1.2rem;
      border-radius: 100px;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(60, 130, 200, 0.12);
      min-height: 5.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.4rem;
      transition: background 0.3s;
      font-family: 'Noto Serif Khmer', serif;
    }

    .status-panel span {
      background: rgba(60, 130, 200, 0.06);
      padding: 0.1rem 1.8rem;
      border-radius: 60px;
      font-weight: 500;
      border: 1px solid rgba(60, 130, 200, 0.08);
      backdrop-filter: blur(2px);
    }

    /* ----- FOOTER : "made by Khat MengHeng" (blue elegant) ----- */
    .footer-credit {
      margin-top: 2.8rem;
      padding-top: 1.6rem;
      border-top: 1px solid rgba(60, 130, 200, 0.12);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem 2rem;
      color: #4a7a9a;
      font-size: 1.1rem;
      letter-spacing: 1px;
      font-family: 'Inter', sans-serif;
    }

    .footer-credit .brand {
      font-weight: 700;
      color: #1a3b5c;
      background: rgba(60, 130, 200, 0.06);
      padding: 0.3rem 1.8rem;
      border-radius: 60px;
      border: 1px solid rgba(60, 130, 200, 0.12);
      backdrop-filter: blur(4px);
      font-size: 1.3rem;
      letter-spacing: 2px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .footer-credit .brand i {
      font-style: normal;
      color: #4a8ab0;
      font-size: 1.4rem;
    }

    .footer-credit .small-note {
      opacity: 0.7;
      font-weight: 300;
      font-size: 1rem;
      letter-spacing: 1.5px;
    }

    .footer-credit .year {
      opacity: 0.5;
      font-weight: 200;
    }

    /* ----- RESPONSIVE (refined) ----- */
    @media (max-width: 740px) {
      .exam-card { padding: 2.2rem 1.2rem 1.8rem; border-radius: 3rem; }
      .main-title { font-size: 2.6rem; }
      .badge-sub { font-size: 1rem; padding: 0.1rem 1.2rem; }
      .exam-name-block { font-size: 2.2rem; padding: 0.3rem 1.4rem; }
      .exam-date-block { font-size: 1.4rem; padding: 0.1rem 1.2rem; }
      .countdown-grid { gap: 0.8rem; }
      .time-number { font-size: 3.6rem; }
      .time-label { font-size: 0.9rem; min-width: 40px; }
      .status-panel { font-size: 1.5rem; padding: 0.6rem 0.8rem; min-height: 4.2rem; }
      .footer-credit { font-size: 0.9rem; flex-direction: column; gap: 0.3rem; }
      .footer-credit .brand { font-size: 1.1rem; padding: 0.2rem 1.2rem; }
    }

    @media (max-width: 480px) {
      .countdown-grid { grid-template-columns: repeat(2, 1fr); gap: 0.7rem; }
      .time-number { font-size: 3rem; }
      .time-unit { padding: 0.8rem 0.1rem 0.5rem; }
      .main-title { font-size: 2rem; }
      .exam-name-block { font-size: 1.8rem; }
      .status-panel { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <div class="exam-card">
    <!-- HEADER -->
    <h1 class="main-title">⌛ រាប់ថយក្រោយ</h1>
    <div class="badge-sub">✦ ប្រឡងថ្នាក់ជាតិ ✦</div>

    <!-- EXAM NAME : Bacll -->
    <div class="exam-name-block">📖 Bacll</div>

    <!-- DATE : 10/08/2026 -->
    <div class="exam-date-block">🗓 ១០ សីហា ២០២៦</div>

    <!-- COUNTDOWN GRID -->
    <div class="countdown-grid" id="countdownGrid">
      <div class="time-unit">
        <div class="time-number" id="days">00</div>
        <span class="time-label">ថ្ងៃ</span>
      </div>
      <div class="time-unit">
        <div class="time-number" id="hours">00</div>
        <span class="time-label">ម៉ោង</span>
      </div>
      <div class="time-unit">
        <div class="time-number" id="minutes">00</div>
        <span class="time-label">នាទី</span>
      </div>
      <div class="time-unit">
        <div class="time-number" id="seconds">00</div>
        <span class="time-label">វិនាទី</span>
      </div>
    </div>

    <!-- STATUS MESSAGE (Khmer) -->
    <div class="status-panel" id="statusMessage">
      <span>📌 កំពុងរាប់...</span>
    </div>

    <!-- FOOTER : made by Khat MengHeng (elegant) -->
    <div class="footer-credit">
      <span class="brand"><i>✦</i> Khat MengHeng</span>
      <span class="small-note">• រចនាដោយ ខាត់ ម៉េងហេង •</span>
      <span class="year">2026</span>
    </div>
  </div>

  <script>
    (function() {
      // TARGET: 10 August 2026 00:00:00
      const TARGET = new Date(2026, 7, 10, 0, 0, 0);

      const daysEl = document.getElementById('days');
      const hoursEl = document.getElementById('hours');
      const minutesEl = document.getElementById('minutes');
      const secondsEl = document.getElementById('seconds');
      const statusMsg = document.getElementById('statusMessage');

      function pad(n) {
        return String(n).padStart(2, '0');
      }

      function update() {
        const now = Date.now();
        const diff = TARGET.getTime() - now;

        if (diff <= 0) {
          daysEl.textContent = '00';
          hoursEl.textContent = '00';
          minutesEl.textContent = '00';
          secondsEl.textContent = '00';
          statusMsg.innerHTML = '<span>✅ ប្រឡងបានចាប់ផ្តើមហើយ!</span>';
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        let rem = diff - days * (1000 * 60 * 60 * 24);
        const hours = Math.floor(rem / (1000 * 60 * 60));
        rem -= hours * (1000 * 60 * 60);
        const minutes = Math.floor(rem / (1000 * 60));
        rem -= minutes * (1000 * 60);
        const seconds = Math.floor(rem / 1000);

        daysEl.textContent = pad(days);
        hoursEl.textContent = pad(hours);
        minutesEl.textContent = pad(minutes);
        secondsEl.textContent = pad(seconds);

        // smart status message
        let msg = '';
        if (days > 0) msg = `នៅសល់ ${days} ថ្ងៃ`;
        else if (hours > 0) msg = `នៅសល់ ${hours} ម៉ោង`;
        else if (minutes > 0) msg = `នៅសល់ ${minutes} នាទី`;
        else msg = `នៅសល់ ${seconds} វិនាទី`;
        statusMsg.innerHTML = `<span>⏳ ${msg}</span>`;
      }

      update();
      const interval = setInterval(update, 1000);

      // re-sync on visibility change
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) update();
      });

      // extra sync every 30s
      setInterval(update, 30000);

      window.addEventListener('beforeunload', () => clearInterval(interval));
    })();
  </script>

</body>
</html>
